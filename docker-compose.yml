name: akwab-event-prod

services:

  db:
    image: mysql:8.0
    container_name: akwab-db-prod
    restart: always
    env_file:
      - ./Akwab-Api/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    
    volumes:
      - db_data_prod:/var/lib/mysql
    networks:
      - akwab-network-prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  api:
    build:
      context: ./Akwab-Api
      dockerfile: Dockerfile          
    container_name: akwab-api-prod
    restart: always
    env_file:
      - ./Akwab-Api/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db

    volumes:
      - api_storage:/var/www/api/storage 
    depends_on:
      db:
        condition: service_healthy
    networks:
      - akwab-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  nginx:
    image: nginx:1.25-alpine
    container_name: akwab-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"                  
    volumes:
      - api_storage:/var/www/api/storage:ro   
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      
    depends_on:
      - api
    networks:
      - akwab-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  front:
    build:
      context: ./Akwab-Front
      dockerfile: Dockerfile          
    container_name: akwab-front-prod
    restart: always
    ports:
      - "8080:80"                     
    networks:
      - akwab-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"



volumes:
  db_data_prod:
    driver: local
  api_storage:
    driver: local

networks:
  akwab-network-prod:
    driver: bridge