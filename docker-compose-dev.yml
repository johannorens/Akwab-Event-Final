name: akwab-event-dev

services:

  db:
    image: mysql:8.0
    container_name: akwab-db-dev
    restart: unless-stopped
    env_file:
      - ./Akwab-Api/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
    networks:
      - akwab-network-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./Akwab-Api
      dockerfile: dockerfile.dev
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    container_name: akwab-api-dev
    restart: unless-stopped
    env_file:
      - ./Akwab-Api/.env
    environment:
      DB_HOST: db
    volumes:
      - ./Akwab-Api:/var/www/api
      - api_vendor:/var/www/api/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - akwab-network-dev

  nginx:
    image: nginx:1.25-alpine
    container_name: akwab-nginx-dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Akwab-Api:/var/www/api
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - akwab-network-dev

  front:
    build:
      context: ./Akwab-Front
      dockerfile: dockerfile.dev
    container_name: akwab-front-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./Akwab-Front:/app
      - front_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
    networks:
      - akwab-network-dev

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: akwab-phpmyadmin-dev
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - akwab-network-dev

volumes:
  db_data_dev:
    driver: local
  api_vendor:
    driver: local
  front_node_modules:
    driver: local

networks:
  akwab-network-dev:
    driver: bridge